<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Reference lines to visualize SVG coordinate system. The content
       bbox spans x=40..1240 and y=40..620 — symmetric in the 1280x720
       viewBox. Left/right margins should therefore be equal if the
       rendering layer centers the image correctly. -->

  <!-- Full viewBox outline so we can see where the SVG's edges are -->
  <rect x="0" y="0" width="1280" height="720" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Left content edge marker -->
  <line x1="40" y1="0" x2="40" y2="720" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="44" y="20" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">x=40 (left content edge)</text>

  <!-- Right content edge marker -->
  <line x1="1240" y1="0" x2="1240" y2="720" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1236" y="20" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">x=1240 (right content edge)</text>

  <!-- Horizontal centerline of the viewBox (x=640) -->
  <line x1="640" y1="0" x2="640" y2="720" stroke="#2196f3" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="648" y="715" font-family="Arial, sans-serif" font-size="14" fill="#2196f3">x=640 (viewBox center)</text>

  <!-- Content boxes that fill the usable area exactly -->
  <rect x="40" y="80" width="380" height="500" rx="6" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="230" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">LEFT BOX</text>
  <text x="230" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">x: 40..420</text>

  <rect x="450" y="80" width="380" height="500" rx="6" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
  <text x="640" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">CENTER BOX</text>
  <text x="640" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">x: 450..830</text>

  <rect x="860" y="80" width="380" height="500" rx="6" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
  <text x="1050" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">RIGHT BOX</text>
  <text x="1050" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">x: 860..1240</text>

  <!-- Caption at the bottom -->
  <text x="640" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#212121">
    If centered correctly, the green box's center (x=640 in SVG) should sit exactly at the rendered slide's horizontal center.
  </text>
</svg>
