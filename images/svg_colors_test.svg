<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <style>
      :root, svg {
        --bg: #ffffff;
        --primary: #1e88e5;
        --primary-dk: #1565c0;
        --ok: #43a047;
        --ok-dk: #2e7d32;
        --danger: #e53935;
        --text-dark: #333333;
      }
    </style>
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="grad-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- ROW 1: CSS var() colors -->
  <text x="40" y="40" font-size="20" font-weight="bold">Row 1: CSS var() references</text>

  <rect x="40" y="60" width="200" height="80" rx="10" fill="var(--primary)" stroke="var(--primary-dk)" stroke-width="3" />
  <text x="140" y="108" text-anchor="middle" font-size="16" fill="var(--bg)" font-weight="bold">var(--primary)</text>

  <rect x="280" y="60" width="200" height="80" rx="10" fill="var(--ok)" stroke="var(--ok-dk)" stroke-width="3" />
  <text x="380" y="108" text-anchor="middle" font-size="16" fill="var(--bg)" font-weight="bold">var(--ok)</text>

  <rect x="520" y="60" width="200" height="80" rx="10" fill="var(--danger)" stroke="var(--text-dark)" stroke-width="3" />
  <text x="620" y="108" text-anchor="middle" font-size="16" fill="var(--bg)" font-weight="bold">var(--danger)</text>

  <!-- ROW 2: Raw hex colors (control) -->
  <text x="40" y="200" font-size="20" font-weight="bold">Row 2: Raw hex colors (control)</text>

  <rect x="40" y="220" width="200" height="80" rx="10" fill="#1e88e5" stroke="#1565c0" stroke-width="3" />
  <text x="140" y="268" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">#1e88e5</text>

  <rect x="280" y="220" width="200" height="80" rx="10" fill="#43a047" stroke="#2e7d32" stroke-width="3" />
  <text x="380" y="268" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">#43a047</text>

  <rect x="520" y="220" width="200" height="80" rx="10" fill="#e53935" stroke="#333333" stroke-width="3" />
  <text x="620" y="268" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">#e53935</text>

  <!-- ROW 3: Gradient fills (url references) -->
  <text x="40" y="360" font-size="20" font-weight="bold">Row 3: Gradient fills url(#id)</text>

  <rect x="40" y="380" width="200" height="80" rx="10" fill="url(#grad-primary)" stroke="#1565c0" stroke-width="3" />
  <text x="140" y="428" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">grad-primary</text>

  <rect x="280" y="380" width="200" height="80" rx="10" fill="url(#grad-ok)" stroke="#2e7d32" stroke-width="3" />
  <text x="380" y="428" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">grad-ok</text>

  <!-- ROW 4: Gradient fill + var() text -->
  <text x="40" y="520" font-size="20" font-weight="bold">Row 4: Gradient fill + var() text</text>

  <rect x="40" y="540" width="200" height="80" rx="10" fill="url(#grad-primary)" stroke="var(--primary-dk)" stroke-width="3" />
  <text x="140" y="588" text-anchor="middle" font-size="16" fill="var(--bg)" font-weight="bold">grad + var</text>

  <rect x="280" y="540" width="200" height="80" rx="10" fill="url(#grad-ok)" stroke="var(--ok-dk)" stroke-width="3" />
  <text x="380" y="588" text-anchor="middle" font-size="16" fill="var(--bg)" font-weight="bold">grad + var</text>
</svg>
